<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silkroad Origin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="brand-header">
        <h1>SILKROAD<span>ORIGIN</span></h1>
        <p>The Ultimate Gaming Marketplace</p>
    </div>

    <div class="tab-navigation">
        <button class="tab-btn active" onclick="switchTab('buyer')">🛒 Marketplace</button>
        <button class="tab-btn" onclick="switchTab('seller')">⚔️ Sell Account</button>
    </div>

    <div id="buyerTab" class="tab-content active">
        <div class="filter-wrapper">
            <input type="text" id="searchBar" placeholder="🔍 Search..." oninput="filterAccounts()">
            <input type="text" id="filterServer" placeholder="📍 Server" oninput="filterAccounts()">
            <input type="number" id="filterPrice" placeholder="💰 Max Price" oninput="filterAccounts()">
        </div>
        <div class="accounts-grid" id="accountsGrid"></div>
    </div>

    <div id="sellerTab" class="tab-content">
        <div class="form-container">
            <h2>List your Legend here! ⚔️</h2>
            <form id="sellAccountForm">
                <input type="text" id="sellerName" placeholder="Your Name" required>
                <input type="tel" id="sellerPhone" placeholder="WhatsApp Number" required>
                <input type="text" id="accTitle" placeholder="Listing Title" required>
                <input type="text" id="accServer" placeholder="Server Name" required>
                <input type="number" id="accLevel" placeholder="Level" required>
                <input type="number" id="accPrice" placeholder="Price ($)" required>
                <textarea id="accDesc" placeholder="Description..."></textarea>
                <input type="file" id="accImage">
                <button type="submit" class="submit-btn">Publish Account Now ✨</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
